<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huddle Landing Page</title> 
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="images/favicon-32x32.png">
</head>
<body >
    <main>
        <img class="huddle" src="images/logo.svg" alt="logo">
        <div class="huddle-div">
            <div>
                <img class="illustration" src="images/illustration-mockups.svg" alt="illustration-image">
            </div>
            <div class="building">
                <h1>Build The Community <br> Your Fans Will Love</h1>
                <p>Huddle re-images the way we communities. You have <br> a voice ,but so does your audience. Create connections with <br>your users as you engage in genuine discussion.</p>
                <button type="submit" class="resgister-btn">Register</button>
                <article>
                    <button type="submit" class="fb"><a href="#"><i class="fa-brands fa-facebook-f"></i></a></button>
                    <button type="submit" class="x"><a href="#"><i class="fa-brands fa-x-twitter"></i></a></button>
                    <button type="submit" class="ig"><a href="#"><i class="fa-brands fa-instagram"></i></a></button>
                </article>
            </div>
        </div>
    </main>
</body>
</html>
